{% extends 'base.html' %}

{% block title %}{{ ebook.title }} - Ebook Store{% endblock %}

{% block main_class %}px-4 sm:px-6 lg:px-8 max-w-none{% endblock %}

{% block extra_css %}
<style>
    .ebook-detail-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        margin-top: 1rem;
        align-items: start;
    }

    .left-panel,
    .right-panel {
        background: rgba(30, 41, 59, 0.45);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        overflow: hidden;
    }

    .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.9rem 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .panel-title {
        font-weight: 700;
        color: #fff;
    }

    .panel-badge {
        color: rgba(226, 232, 240, 0.7);
        font-size: 0.95rem;
        white-space: nowrap;
    }

    .reader-wrap {
        padding: 0.9rem;
    }

    .reader-frame {
        width: 100%;
        height: calc(100vh - 220px);
        min-height: 720px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 12px;
        background: #fff;
    }

    .right-wrap {
        padding: 1.25rem;
    }

    .ebook-details h1 {
        font-size: 2.2rem;
        margin-bottom: 0.75rem;
        line-height: 1.2;
        color: #fff;
    }

    .meta-info {
        display: flex;
        gap: 1.25rem;
        margin-bottom: 1.25rem;
        color: rgba(226, 232, 240, 0.75);
        flex-wrap: wrap;
    }

    .meta-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .price-section {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.14), rgba(236, 72, 153, 0.10));
        padding: 1.25rem;
        border-radius: 16px;
        margin: 1.25rem 0;
        border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .price-large {
        font-size: 2.4rem;
        font-weight: 800;
        color: #fbbf24;
        margin-bottom: 0.75rem;
    }

    .purchase-actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
    }

    .btn-large {
        padding: 0.9rem 1.6rem;
        font-size: 1.02rem;
    }

    .description-section {
        margin: 1rem 0 0;
    }

    .description-section h2 {
        margin-bottom: 0.6rem;
        color: #a5b4fc;
        font-weight: 700;
    }

    .description-text {
        line-height: 1.8;
        color: rgba(226, 232, 240, 0.75);
        white-space: pre-wrap;
    }

    .loading-skeleton {
        background: linear-gradient(90deg, rgba(30, 41, 59, 0.7) 25%, rgba(99, 102, 241, 0.12) 50%, rgba(30, 41, 59, 0.7) 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
        border-radius: 12px;
    }

    @keyframes loading {
        0% {
            background-position: 200% 0;
        }

        100% {
            background-position: -200% 0;
        }
    }

    .reader-actions {
        display: flex;
        gap: 0.75rem;
        margin-top: 0.75rem;
        flex-wrap: wrap;
    }

    .reader-hint {
        color: rgba(226, 232, 240, 0.75);
        line-height: 1.6;
    }

    @media (max-width: 1024px) {
        .ebook-detail-container {
            grid-template-columns: 1fr;
        }

        .reader-frame {
            height: 70vh;
            min-height: 520px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div id="ebookContent" class="ebook-detail-container fade-in">

    <div class="left-panel">
        <div class="panel-header">
            <div class="panel-title">📖 Nội dung sách</div>
            <div class="panel-badge" id="readerBadge"></div>
        </div>
        <div class="reader-wrap">
            <div id="ebookReader" class="loading-skeleton" style="height: 720px;"></div>
        </div>
    </div>

    <div class="right-panel">
        <div class="right-wrap ebook-details">
            <h1 id="ebookTitle"></h1>
            <div id="titleSkeleton" class="loading-skeleton" style="height: 2.8rem; width: 85%; margin-bottom: 0.75rem;"></div>

            <div class="meta-info" id="metaInfo">
                <div class="loading-skeleton" style="height: 1.3rem; width: 180px;"></div>
                <div class="loading-skeleton" style="height: 1.3rem; width: 140px;"></div>
            </div>

            <div class="price-section">
                <div class="price-large" id="ebookPrice">...</div>
                <div class="purchase-actions">
                    <button class="btn btn-primary btn-large" id="buyBtn" disabled>💰 Mua ngay</button>
                    <button class="btn btn-secondary btn-large" type="button">❤️ Yêu thích</button>
                </div>
            </div>

            <div class="description-section">
                <h2>📝 Mô tả</h2>
                <div class="description-text loading-skeleton" id="ebookDescription" style="height: 150px;"></div>
            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
    const ebookId = parseInt("{{ ebook_id }}", 10);

    async function loadEbookDetail() {
        try {
            const response = await fetch(`/api/ebooks/ebook/${ebookId}/`);
            if (!response.ok) throw new Error("Fetch failed");
            const ebook = await response.json();

            const titleEl = document.getElementById('ebookTitle');
            titleEl.textContent = ebook.title;
            document.getElementById('titleSkeleton').style.display = 'none';       

            document.getElementById('metaInfo').innerHTML = `
                <div class="meta-item"><span>👤</span><span>${ebook.author?.name || ''}</span></div>
                <div class="meta-item"><span>📂</span><span>${ebook.category || ''}</span></div>
            `;

            document.getElementById('ebookPrice').textContent = `${ebook.price} 💰`;

            const descEl = document.getElementById('ebookDescription');
            descEl.textContent = ebook.description || '';
            descEl.classList.remove('loading-skeleton');

            const buyBtn = document.getElementById('buyBtn');
            buyBtn.disabled = false;
            buyBtn.onclick = () => purchaseEbook(ebook.id, ebook.price);

            const badge = document.getElementById('readerBadge');
            badge.textContent = ebook.file_mime ? ebook.file_mime : '';

            const reader = document.getElementById('ebookReader');
            reader.classList.remove('loading-skeleton');

            if (ebook.file_url) {
                const isPdf = (ebook.file_mime === 'application/pdf') ||
                    (ebook.file_url && ebook.file_url.toLowerCase().endsWith('.pdf'));

                if (isPdf) {
                    reader.innerHTML = `<iframe class="reader-frame" src="${ebook.file_url}" loading="lazy"></iframe>`;
                } else {
                    reader.innerHTML = `
                        <div class="reader-hint">
                            File sách là <b>${ebook.file_mime || 'định dạng khác'}</b>. Bạn có thể mở hoặc tải:
                        </div>
                        <div class="reader-actions">
                            <a class="btn btn-primary btn-large" href="${ebook.file_url}" target="_blank" rel="noopener">
                                📥 Mở / Tải file sách
                            </a>
                        </div>
                    `;
                }
            } else {
                reader.innerHTML = `<div class="reader-hint">Chưa có file sách. Admin vui lòng upload file.</div>`;
            }

        } catch (error) {
            const titleEl = document.getElementById('ebookTitle');
            titleEl.textContent = 'Không tìm thấy sách';
            titleEl.classList.remove('loading-skeleton');

            const descEl = document.getElementById('ebookDescription');
            descEl.textContent = 'Vui lòng quay lại trang chủ';
            descEl.classList.remove('loading-skeleton');

            const reader = document.getElementById('ebookReader');
            reader.classList.remove('loading-skeleton');
            reader.innerHTML = `<div class="reader-hint">Không thể tải dữ liệu sách.</div>`;
        }
    }

    async function purchaseEbook(ebookId, price) {
        if (confirm(`Mua ebook này với ${price} Coins?`)) {
            alert('Chức năng đang phát triển!');
        }
    }

    loadEbookDetail();
</script>
{% endblock %}
